version: v1.0
name: Initial Pipeline
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2004
blocks:
  - name: Checkout
    task:
      jobs:
        - name: 'Checkout code'
          commands:
            - checkout

  - name: 🐳 Building betterplace Docker Image
    dependencies:
      - Checkout
    task:
      secrets:
        - name: GCP

      prologue:
        commands:
          - export PATH=bin:$PATH
          - gcloud auth activate-service-account --key-file=.secrets/gcp.json
          - gcloud auth configure-docker -q
          - cache restore checkout-cache-$SEMAPHORE_GIT_SHA

      jobs:
        - name: Building and pushing
          commands:
            - make build push REVISION=${SEMAPHORE_GIT_SHA}