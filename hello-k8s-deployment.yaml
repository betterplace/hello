apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-deployment # Replace with a descriptive name
spec:
  replicas: 1 # Number of pods to run
  selector:
    matchLabels:
      app: hello-app # Label for pods
  template:
    metadata:
      labels:
        app: hello-app # Label for pods
    spec:
      containers:
        - name: hello
          image: eu.gcr.io/staging-env-182516/hello:c8d3880